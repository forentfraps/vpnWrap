# docker-compose deployment of the full sing-rdp VPN stack:
#
#   [tunnel client] --RDP/TCP 3389--> sing-rdp -> 127.0.0.1:1080 (sing-box-inner)
#                                                 -> direct outbound to the internet
#
# Quickstart:
#   1. ./deploy.sh init    (generates identity, UUID, cert, .env, singbox-server.json)
#   2. ./deploy.sh up      (builds image, brings up both services)
#   3. ./deploy.sh status  (verifies /healthz reports both green)
#   4. ./deploy.sh client-config  (prints copy-paste config for your client)

services:
  # --- inner proxy ---------------------------------------------------------
  # VLESS server bound to loopback. sing-rdp on the same host forwards
  # tunnel traffic here; sing-box dials the actual destinations.
  sing-box-inner:
    image: ghcr.io/sagernet/sing-box:v1.10.7
    container_name: sing-box-inner
    restart: unless-stopped
    network_mode: host
    # The rendered config (with UUID substituted) is created by deploy.sh init.
    # If missing, the container will fail to start — deploy.sh checks for it.
    volumes:
      - ./singbox-server.json:/etc/sing-box/config.json:ro
    command: ["run", "-c", "/etc/sing-box/config.json"]
    # Image is minimal (no curl / nc), so we let the outer sing-rdp /healthz
    # do an upstream TCP probe and surface the combined state.

  # --- transport wrapper ---------------------------------------------------
  sing-rdp:
    build:
      context: .
      target: runtime
    image: sing-rdp:latest
    container_name: sing-rdp
    restart: unless-stopped
    network_mode: host
    depends_on:
      - sing-box-inner
    environment:
      SING_RDP_COOKIE: "${SING_RDP_COOKIE:-svc-jumpbox}"
      SING_RDP_UPSTREAM: "${SING_RDP_UPSTREAM:-127.0.0.1:1080}"
      SING_RDP_LISTEN: ":3389"
      SING_RDP_HOSTNAME: "${SING_RDP_HOSTNAME:-DESKTOP-UNKNOWN}"
      SING_RDP_SNI: "${SING_RDP_SNI:-${SING_RDP_HOSTNAME:-DESKTOP-UNKNOWN}}"
      SING_RDP_NETBIOS_DOMAIN: "${SING_RDP_NETBIOS_DOMAIN:-WORKGROUP}"
      SING_RDP_DNS_DOMAIN: "${SING_RDP_DNS_DOMAIN:-}"
    env_file:
      - path: ./.env
        required: false
    volumes:
      - ./certs:/etc/sing-rdp:ro
    # HEALTHCHECK is baked into the image — see Dockerfile.

  # --- optional: probe sidecar -------------------------------------------
  # Runs the in-image RDP probe against the live server, exits non-zero
  # if the handshake degrades. Trigger with: ./deploy.sh probe
  sing-rdp-probe:
    build:
      context: .
      target: runtime
    image: sing-rdp:latest
    container_name: sing-rdp-probe
    restart: "no"
    profiles: ["test"]
    network_mode: host
    entrypoint: ["/usr/local/bin/sing-rdp-probe"]
    command:
      - "-addr"
      - "127.0.0.1:3389"
      - "-cookie"
      - "${SING_RDP_COOKIE:-svc-jumpbox}"
      - "-insecure"
    depends_on:
      sing-rdp:
        condition: service_healthy
